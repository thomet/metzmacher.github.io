name: Update Lambus trips

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trips:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch public Lambus metadata
        run: node scripts/fetch-lambus-trips.mjs

      - name: Commit updated trip data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/trips.generated.json
          git diff --cached --quiet || git commit -m "Update Lambus trip data"
          git push
